<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Example</title>
</head>
<body>

<h2>Simple Addition Program</h2>

<p id="result"></p>

<script>
  let num1 = 40;
  let num2 = 30;

  let sum = num1 + num2;

  document.getElementById("result").innerHTML =
    "Sum of " + num1 + " and " + num2 + " is: " + sum;
</script>

</body>
</html>
